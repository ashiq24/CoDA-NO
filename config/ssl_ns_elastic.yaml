base_config: &BASE_CONFIG
    ## SSL parameters
    random_seed: 42
    config: " "
    nettype: 'transformer'
    evaluation_channel_drop: 1
    drop_type : 'zeros'
    grid_type: 'uniform'
    max_block : 0.3
    drop_pix: 0.4
    channel_per: 0.5
    channel_drop_per: 0.5

    validation_aug: !!bool False
    max_block_val : 0.3
    drop_pix_val: 0.4
    channel_per_val: 0.2
    channel_drop_per_val: 1.0
    n_neigbor: 10

    scheduler_type: 'step'
    batch_size: 4
    use_variable_encoding: !!bool True
    n_variables: 5
    masking: !!bool True
    in_token_codim_en: 1
    kqv_non_linear: !!bool False
    hidden_token_codim_en: 6
    lifting_token_codim_en: 12
    lifting_token_codim_pred: 12
    out_token_codim_pred:  1
    n_layers_en: 2
    n_heads_en:      [2,2]  
    n_layers_dec: 2
    n_heads_dec:      [2,2]
    n_layers_pred: 3
    n_heads_pred:    [2,2,2]
    
    scalings_pred:     [[1,1], [1,1], [1,1]]
    scalings_en:     [[1,1], [1,1],[1,1]]
    scalings_dec:     [[1,1],[1,1]]

    n_modes_en:       [[100,100], [100,100]]
    n_modes_dec:       [[100,100], [100,100]]
    n_modes_pred:       [[100,100], [100,100],[100,100]]

    per_channel_attention: !!bool True
    

    #fft_type: 'fft' #  Duplicate should be removed
    transform_type: 'fft' # might be also spherical harmonics transform or 'sht'

    tno_integral_op: 'fno'

    var_encoding: !!bool True
    n_encoding_channels: 3
    reconstruction: !!bool True
    enable_cls_token: !!bool True

    add_static_feature: !!bool False

    pretrain_ssl : !!bool True #if true we pretrain the model by SSL

    # if True, it will fine tune the encoder during SL
    # otherwise it will freeze the weight of the encoder 
    # which is trained by SSL

    ## training Hyeper parameters
    training_stage: 'regular'
    freeze_encoder : !!bool False
    lr: 0.03
    weight_decay: 0.0000
    scheduler_step: 50
    scheduler_gamma: 0.5
    epochs: 50
    clip_gradient: !!bool True
    gradient_clip_value: 0.1
    ssl_only: !!bool False
    weight_path: '../weights/'

    # Weights and biases
    wandb_log: True
    wandb_name: 'codano'
    wandb_group: 'neuraloperator'
    wandb_project: 'CoDA-NO'
    wandb_entity: 'ashiq24'
    wandb_log_test_interval: 1

codano_gno: &CODANO_GNO
    <<: *BASE_CONFIG
    # dataset hyper 
    ntrain: None
    n_dim: 2
    equation_dict: { "NS": 3} # , "ES": 2}
    ntest: None
    sample_per_inlet: 186 # set to 186 to make total data per mu 5000
    input_mesh_location: "../Data/TF_cfd_results/mesh.h5"
    data_location: "../Data/TF_cfd_results"
    dt: 2 #dt in markovian model
    mu_list: [1, 0.01]
    radius: 0.15
    gno_mlp_layers: [10]
    grid_size: [251, 42]
    grid_type: 'non uniform'
    
    # training. hypers
    
    epochs: 20
    batch_size: 1
    lr: 0.01
    weight_decay: 0.0000
    scheduler_type: 'rdp'
    scheduler_step: 3
    scheduler_gamma: 0.8
    gradient_clip_value: 0.001
    
    
    n_encoding_channels: 8
    n_modes_en:       [[251, 42], [251, 42], [251, 42]]
    n_modes_dec:       [[251, 42]]
    n_modes_pred:       [[251, 42], [251, 42]]
    
    
    scalings_en:     [[1,1], [1,1], [1,1]]
    scalings_dec:     [[1,1]]
    scalings_pred:     [[1,1], [1,1]]
    
    masking_radius: 0.05
    n_static_channels: 4
    in_token_codim_en: 1
    hidden_token_codim_en: 40
    lifting_token_codim_en: 80
    lifting_token_codim_pred: 80
    out_token_codim_pred:  1
    n_layers_en: 3
    n_heads_en:      [30,30,30]  
    n_layers_dec: 1
    n_heads_dec:      [30]
    n_layers_pred: 2
    n_heads_pred:    [30,30]
    
    pretrain_ssl : !!bool True
    freeze_encoder : !!bool True
    positional_encoding_dim: 4

codano_non_lin: &CODANO_NON_LIN
    <<: *CODANO_GNO
    kqv_non_linear: !!bool True

codano_gno_full:
    <<: *CODANO_GNO
    ssl_only: !!bool True
    mu_list : [1, 0.1,0.01]
codano_gno_.01:
    <<: *CODANO_GNO
    mu_list : [0.01]
codano_gno_.1:
    <<: *CODANO_GNO
    mu_list : [0.1]
codano_gno_.5:
    <<: *CODANO_GNO
    mu_list : [0.5]
codano_gno_1:
    <<: *CODANO_GNO
    mu_list : [1]
codano_gno_10:
    <<: *CODANO_GNO
    mu_list : [10]  

codano_test: &CODANO_TEST
    <<: *CODANO_GNO

    equation_dict: { "NS": 3 , "ES": 2}
    input_mesh_location: "../Data/TF_fsi2_results/mesh.h5"
    data_location: "../Data/TF_fsi2_results"

    epochs: 5
    mu_list: [1.0]
    lr: 0.01
    weight_decay: 0.0000
    scheduler_step: 5
    gradient_clip_value: 0.01
    scheduler_gamma: 0.8
    channel_per_val: 0.5  # channel dropping percentage during validation
    ntrain: 1
    radius: 0.05
    ntest: 1
    ssl_only: !!bool False
    pretrain_ssl : !!bool True
    kqv_non_linear: !!bool True
    channel_per: 0.3
    channel_drop_per: 0.5
    per_channel_attention: !!bool True
    
fno_gno: &FNO_GNO
    <<: *CODANO_GNO
    nettype: 'simple'

    # data config
    equation_dict: { "NS": 3}
    n_variables: 3
    in_dim: 3
    out_dim: 3

    #architecture 
    hidden_dim: 64
    lifting_dim: 128
    projection_dim: 128
    n_modes:       [[180,30], [180,30],[180,30], [180,30]]
    scalings:      [[1,1],[1,1],[1,1], [1,1]]
    n_layers: 4
    grid_size: [251, 42]
    pretrain_ssl : !!bool False
    freeze_encoder : !!bool False
    
    # training hyper
    
    lr: 0.001
    epochs: 20
    scheduler_type: 'rdp'
    weight_decay: 0.0000
    scheduler_step: 3
    scheduler_gamma: 0.8
    clip_gradient: !!bool True
    gradient_clip_value: 1.0
    
    
    
    # does not supporting turning on
    n_encoding_channels: 0
    enable_cls_token: !!bool False

fno_test: &FNO_TEST
    <<: *FNO_GNO
    mu_list: [1.0]
    channel_per_val: 0.5
    epochs: 10
    scheduler_type: 'rdp'
    ntrain: 1
    ntest: 5

fno_gno_.01: 
    <<: *FNO_GNO
    mu_list: [0.01]
fno_gno_.1: 
    <<: *FNO_GNO
    mu_list: [0.1]
fno_gno_.5: 
    <<: *FNO_GNO
    mu_list: [0.5]
fno_gno_1: 
    <<: *FNO_GNO
    mu_list: [1]
fno_gno_10: 
    <<: *FNO_GNO
    mu_list: [10]
fno_gno_combined: 
    <<: *FNO_GNO
    mu_list: [0.01,0.1,1]

gnn_test:
    <<: *FNO_GNO
    # data config
    mu_list: [1.0]
    equation_dict: { "NS": 3}
    n_variables: 3
    in_dim: 3
    out_dim: 3

    epochs: 100
    nettype: 'gnn'
    

    
    n_neigbor: 10
    gno_mlp_layers: [200, 200]
    hidden_dim: 128
    lifting_dim: 256
    projection_dim: 256
    ntrain: 1
    ntest: 5
    dt: 2

fno: &FNO
    <<: *FNO_GNO
    wandb_name: 'fno'
    n_modes:       [180,30]
    grid_type: 'uniform'


codano_finetune: &CODANO_FINETUNE
    <<: *CODANO_GNO
    epochs: 20
    training_stage: 'fine_tune'
    equation_dict: { "NS": 3 , "ES": 2}
    freeze_encoder : !!bool True
    pretrain_ssl : !!bool False
    lr: 0.01
    pretrain_weight: "../weights/codano_gno_full_ssl.pt"
    NS_variable_encoder_path: "../weights/codano_test_variable_encoder__NS.pt"
    ES_variable_encoder_path: "../weights/codano_test_variable_encoder__ES.pt"

codano_finetune_test:
    <<: *CODANO_FINETUNE
    epochs: 5
    equation_dict: { "NS": 3 }
    input_mesh_location: "../Data/TF_cfd_results/mesh.h5"
    data_location: "../Data/TF_cfd_results"

    pretrain_weight: "../weights/codano_test_ssl.pt"
    mu_list: [10.0]
    dt: 2
    ntrain: 1
    ntest: 5

codano_finetune_.01:
    <<: *CODANO_FINETUNE
    mu_list : [0.01]
codano_finetune_.1:
    <<: *CODANO_FINETUNE
    mu_list : [0.1]
codano_finetune_.5:
    <<: *CODANO_FINETUNE
    mu_list : [0.5]
codano_finetune_1:
    <<: *CODANO_FINETUNE
    mu_list : [1]
codano_finetune_.10:
    <<: *CODANO_FINETUNE
    mu_list : [10] 


    



    
    