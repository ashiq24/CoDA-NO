base_config: &BASE_CONFIG
    ## SSL parameters
    nettype: 'transformer'
    evaluation_channel_drop: 1
    drop_type : 'zeros'
    grid_type: 'uniform'
    max_block : 0.3
    drop_pix: 0.4
    channel_per: 0.5
    channel_drop_per: 0.5

    validation_aug: !!bool False
    max_block_val : 0.3
    drop_pix_val: 0.4
    channel_per_val: 0.2
    channel_drop_per_val: 1.0

    batch_size: 4

    var_num: 5
    in_token_codim_en: 1
    kqv_non_linear: !!bool False
    hidden_token_codim_en: 6
    lifting_token_codim_en: 12
    lifting_token_codim_pred: 12
    out_token_codim_pred:  1
    n_layers_en: 2
    n_heads_en:      [2,2]  
    n_layers_dec: 2
    n_heads_dec:      [2,2]
    n_layers_pred: 3
    n_heads_pred:    [2,2,2]
    
    scalings_pred:     [[1,1], [1,1], [1,1]]
    scalings_en:     [[1,1], [1,1],[1,1]]
    scalings_dec:     [[1,1],[1,1]]

    n_modes_en:       [[100,100], [100,100]]
    n_modes_dec:       [[100,100], [100,100]]
    n_modes_pred:       [[100,100], [100,100],[100,100]]

    per_channel_attention: !!bool True
    

    fft_type: 'fft' # might be also spherical harmonics transform or 'sht'
    tno_integral_op: 'fno'

    var_encoding: !!bool True
    var_enco_channels: 3
    reconstruction: !!bool True
    enable_cls_token: !!bool True

    add_static_feature: !!bool False

    pretrain_ssl : !!bool True #if true we pretrain the model by SSL

    # if True, it will fine tune the encoder during SL
    # otherwise it will freeze the weight of the encoder 
    # which is trained by SSL
    freeze_encoder : !!bool False
    lr: 0.03
    weight_decay: 0.0000
    scheduler_step: 50
    scheduler_gamma: 0.5
    epochs: 50
    clip_gradient: !!bool True
    gradient_clip_value: 0.001
    weight_path: '../weights/ssl_weight.pt'

    # Weights and biases
    wandb_log: True
    wandb_name: 'codano'
    wandb_group: 'neuraloperator'
    wandb_project: 'CoDA-NO'
    wandb_entity: 'ashiq24'
    wandb_log_test_interval: 1

codano_gno: &CODANO_GNO
    <<: *BASE_CONFIG
    # dataset hyper 
    ntrain: None
    ntest: None
    input_mesh_location: "../Data/MP_data/mesh.csv"
    dt: 2 #dt in markovian model
    
    radius: 0.15
    gno_mlp_layers: [10]
    grid_size: [251, 42]
    grid_type: 'non uniform'
    
    # training. hypers
    
    epochs: 30
    batch_size: 1
    lr: 0.01
    weight_decay: 0.0000
    scheduler_step: 10
    scheduler_gamma: 0.8
    gradient_clip_value: 0.001
    
    
    var_enco_channels: 8
    n_modes_en:       [[180,30], [180,30], [180,30]]
    n_modes_dec:       [[180,30]]
    n_modes_pred:       [[180,30], [180,30]]
    
    
    scalings_en:     [[1,1], [1,1], [1,1]]
    scalings_dec:     [[1,1]]
    scalings_pred:     [[1,1], [1,1]]
    
    masking_radius: 0.08
    
    in_token_codim_en: 1
    hidden_token_codim_en: 30
    lifting_token_codim_en: 40
    lifting_token_codim_pred: 40
    out_token_codim_pred:  1
    n_layers_en: 3
    n_heads_en:      [30,30,30]  
    n_layers_dec: 1
    n_heads_dec:      [30]
    n_layers_pred: 2
    n_heads_pred:    [30,30]
    
    pretrain_ssl : !!bool True
    freeze_encoder : !!bool True

codano_non_lin: &CODANO_NON_LIN
    <<: *CODANO_GNO
    kqv_non_linear: !!bool True
    
codano_test: &CODANO_TEST
    <<: *CODANO_GNO
    epochs: 10
    lr: 0.03
    weight_decay: 0.0000
    scheduler_step: 30
    gradient_clip_value: 0.001
    scheduler_gamma: 0.8
    channel_per_val: 0.5
    ntrain: 1
    ntest: 5
    kqv_non_linear: !!bool True
    channel_per: 0.3
    channel_drop_per: 0.5
    per_channel_attention: !!bool True
    
fno_gno: &FNO_GNO
    <<: *CODANO_GNO
    nettype: 'simple'
    
    #architecture 
    in_dim: 5
    hidden_dim: 64
    lifting_dim: 128
    projection_dim: 128
    n_modes:       [[180,30], [180,30],[180,30], [180,30]]
    scalings:      [[1,1],[1,1],[1,1], [1,1]]
    n_layers: 4
    out_dim:  5
    grid_size: [251, 42]
    pretrain_ssl : !!bool False
    freeze_encoder : !!bool False
    
    # training hyper
    
    lr: 0.01
    weight_decay: 0.0000
    scheduler_step: 10
    scheduler_gamma: 0.5
    clip_gradient: !!bool True
    gradient_clip_value: 0.1
    
    
    
    # does not supporting turning on
    var_enco_channels: 0
    enable_cls_token: !!bool False

fno_test: &FNO_TEST
    <<: *FNO_GNO
    channel_per_val: 0.5
    epochs: 100
    ntrain: 1
    ntest: 5
    
fno: &FNO
    <<: *FNO_GNO
    wandb_name: 'fno'
    n_modes:       [180,30]
    grid_type: 'uniform'




